pre-commit:
  commands:
    branch-protection:
      run: scripts/hooks/branch-protection.sh
    quality-gates:
      run: just pre-commit

pre-push:
  commands:
    version-check:
      run: just pre-push
    review-check:
      run: scripts/hooks/review-check.sh

post-merge:
  commands:
    rebuild:
      run: scripts/hooks/post-merge-rebuild.sh
